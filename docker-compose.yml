services:
  postgres:
    image: postgres:17.5    
    environment:
      #HOST: postgres
      POSTGRES_USER: calderarogustavo
      POSTGRES_PASSWORD: Gusang_20011
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    networks:
      - local-network
  pgadmin:
    image: dpage/pgadmin4:9.5
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: gucalderaro@hotmail.com
      PGADMIN_DEFAULT_PASSWORD: Gusang_20011
    ports:
      - 8083:80
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - local-network
  kafka:
   image: apache/kafka:latest
   container_name: kafka
   ports:
    - "9092:9092"
   environment:
    CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    KAFKA_NODE_ID: 1
    KAFKA_PROCESS_ROLES: "broker,controller"
    KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
    KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
    KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
    KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
    KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
   networks:
    - local-network
  kafka-ui:
   image: provectuslabs/kafka-ui:v0.7.2
   ports:
    - "8084:8080"
   environment:
    KAFKA_CLUSTERS_0_NAME: service-kafka-cluster
    KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
   depends_on:
    - kafka
   networks:
    - local-network  
  sonar:
     image: sonarqube:latest
     container_name: sonar
     ports:
      - "9000:9000"
     environment:
       SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true" 
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - local-network    
  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    ports:
     - "3000:3000"
    environment:
    - GF_SECURITY_ADMIN_PASSWORD=pass
    depends_on:
    - prometheus
    networks:
    - local-network
volumes:
  postgres-data:
  pgadmin-data:
  kafka-data:
networks:
  local-network:
    driver: bridge
